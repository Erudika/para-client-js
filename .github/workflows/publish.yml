name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
      # See "TAG CONVENTION" above if you prefer tags with a "v" prefix.
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        # Option A (OIDC): leave NPM_TOKEN unset — npm uses the OIDC exchange instead.
        # Option B (token): set NPM_TOKEN in repo secrets.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
